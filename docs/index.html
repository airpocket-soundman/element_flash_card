<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>元素フラッシュカード</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section id="menu-screen" class="screen active">
      <h1>元素フラッシュカード</h1>
      <p>開示する項目を選んでコース開始。答えを見た後に自己採点します。</p>
      <div class="range-settings">
        <p class="range-title">出題範囲（元素番号）</p>
        <div class="range-inputs">
          <span>#</span>
          <input id="range-min" type="number" min="1" max="118" value="1" />
          <span>〜</span>
          <input id="range-max" type="number" min="1" max="118" value="40" />
        </div>
      </div>
      <div class="menu-buttons">
        <button data-course="number">元素番号コース</button>
        <button data-course="english">元素名(英語)コース</button>
        <button data-course="japanese">元素名(日本語)コース</button>
        <button data-course="symbol">元素記号コース</button>
        <button id="go-results">リザルトを見る</button>
      </div>
    </section>

    <section id="quiz-screen" class="screen">
      <div class="top-actions">
        <button class="back-menu">メニューに戻る</button>
      </div>
      <h2 id="quiz-title"></h2>
      <div class="card">
        <div class="row"><span class="label">元素番号</span><span id="q-number" class="value"></span></div>
        <div class="row"><span class="label">元素名(英語)</span><span id="q-english" class="value"></span></div>
        <div class="row"><span class="label">元素名(日本語)</span><span id="q-japanese" class="value"></span></div>
        <div class="row"><span class="label">元素記号</span><span id="q-symbol" class="value"></span></div>
      </div>
      <div class="actions">
        <button id="show-answer">答えを見る</button>
        <button id="mark-correct" disabled>正解</button>
        <button id="mark-wrong" disabled>誤答</button>
      </div>
    </section>

    <section id="result-screen" class="screen">
      <div class="top-actions">
        <button class="back-menu">メニューに戻る</button>
      </div>
      <h2>リザルト</h2>
      <div class="controls">
        <label for="window-size">集計範囲</label>
        <select id="window-size">
          <option value="10000">過去10000問</option>
          <option value="5000">過去5000問</option>
          <option value="1000">過去1000問</option>
          <option value="500">過去500問</option>
        </select>
      </div>
      <div id="result-panels" class="result-panels"></div>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
