<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>元素フラッシュカード</title>
  <meta name="theme-color" content="#0d6bb8" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section id="menu-screen" class="screen active">
      <h1>元素フラッシュカード</h1>
      <p>開示する項目を選んでコース開始。答えを見た後に自己採点します。</p>
      <div class="range-settings">
        <p class="range-title">出題範囲（元素番号）</p>
        <div class="range-dials">
          <div class="dial-block">
            <span class="dial-label">開始</span>
            <div class="dial">
              <button type="button" class="dial-step" data-target="min" data-step="-1" aria-label="開始を1減らす">−</button>
              <div class="dial-track" id="dial-min">
                <ul class="dial-list"></ul>
                <div class="dial-cursor" aria-hidden="true"></div>
              </div>
              <button type="button" class="dial-step" data-target="min" data-step="1" aria-label="開始を1増やす">＋</button>
            </div>
          </div>
          <span class="dial-sep">〜</span>
          <div class="dial-block">
            <span class="dial-label">終了</span>
            <div class="dial">
              <button type="button" class="dial-step" data-target="max" data-step="-1" aria-label="終了を1減らす">−</button>
              <div class="dial-track" id="dial-max">
                <ul class="dial-list"></ul>
                <div class="dial-cursor" aria-hidden="true"></div>
              </div>
              <button type="button" class="dial-step" data-target="max" data-step="1" aria-label="終了を1増やす">＋</button>
            </div>
          </div>
        </div>
        <p class="range-summary"><span id="range-summary">1〜40</span> 番を出題</p>
      </div>
      <div class="menu-buttons">
        <button data-course="number">元素番号コース</button>
        <button data-course="english">元素名(英語)コース</button>
        <button data-course="japanese">元素名(日本語)コース</button>
        <button data-course="symbol">元素記号コース</button>
        <button data-course="symbolInput">入力モード：番号 → 記号</button>
        <button data-course="numberInput">入力モード：記号 → 番号</button>
        <button id="go-results">リザルトを見る</button>
      </div>
    </section>

    <section id="quiz-screen" class="screen">
      <div class="top-actions">
        <button class="back-menu">メニューに戻る</button>
      </div>
      <h2 id="quiz-title"></h2>
      <div class="card">
        <div class="row"><span class="label">元素番号</span><span id="q-number" class="value"></span></div>
        <div class="row"><span class="label">元素名(英語)</span><span id="q-english" class="value"></span></div>
        <div class="row"><span class="label">元素名(日本語)</span><span id="q-japanese" class="value"></span></div>
        <div class="row"><span class="label">元素記号</span><span id="q-symbol" class="value"></span></div>
      </div>
      <div class="actions" id="default-actions">
        <button id="show-answer">答えを見る</button>
        <button id="mark-correct" disabled>正解</button>
        <button id="mark-wrong" disabled>誤答</button>
      </div>
      <div class="input-actions" id="input-actions" hidden>
        <input
          id="answer-input"
          class="answer-input"
          type="text"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          maxlength="3"
        />
        <div class="input-controls">
          <button id="input-submit" type="button">答え合わせ</button>
          <button id="input-next" type="button" hidden>次の問題</button>
        </div>
        <p id="judge-result" class="judge-result" hidden></p>
      </div>
    </section>

    <section id="result-screen" class="screen">
      <div class="top-actions">
        <button class="back-menu">メニューに戻る</button>
      </div>
      <h2>リザルト</h2>
      <div class="controls">
        <label for="window-size">集計範囲</label>
        <select id="window-size">
          <option value="10000">過去10000問</option>
          <option value="5000">過去5000問</option>
          <option value="1000">過去1000問</option>
          <option value="500">過去500問</option>
        </select>
      </div>
      <div id="result-panels" class="result-panels"></div>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
